services:
  - type: web
    name: amazon-arbitrage-sourcing-platform
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.14
      - key: ARBITRAGE_ENVIRONMENT
        value: production
      - key: ARBITRAGE_DATABASE_PATH
        value: /tmp/arbitrage.db
      